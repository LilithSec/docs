site_name: LilithSec
site_description: Documentation for the LilithSec pantheon.
site_url: https://lilithsec.github.io/docs/
repo_url: https://github.com/LilithSec/docs
edit_uri: ""

theme:
  name: material
  # Disable Material's Google Fonts loader — no requests to fonts.googleapis.com
  # or fonts.gstatic.com. Headings use self-hosted Cinzel (docs/fonts/, wired up
  # in stylesheets/pantheon.css); body/nav/code fall back to the local system
  # stack.
  font: false
  # Deep purple + gold/amber "pantheon" palette. The dark base is Material's
  # built-in `slate` scheme; the exact colors (purple-tinted grays, gold accent
  # and links) are set in docs/stylesheets/pantheon.css via extra_css below.
  palette:
    scheme: slate
    primary: deep purple
  features:
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/pantheon.css

# Rewrites github.com/<org>/<repo> cross-links into internal section links when
# that repo is part of this site. Keyed on bare repo name, so it survives both
# the LilithSec<->VVelox org drift and the Plugtools->Nissaba rename.
hooks:
  - hooks/pantheon_links.py

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

# The per-component sections below (lilith/, lilu/, ...) are populated by
# scripts/sync-docs.sh, which pulls each repo's docs/ dir. Run that before
# building. Page titles come from each page's H1, so only paths are listed.
nav:
  - Home: index.md
  - The Pantheon: pantheon.md
  - Lilith:
      - lilith/index.md
      - lilith/architecture.md
      - lilith/install.md
      - lilith/configuration.md
      - lilith/usage.md
      - lilith/escalation.md
      - lilith/security.md
      - lilith/examples.md
  - Lilu:
      - lilu/index.md
      - lilu/architecture.md
      - lilu/install.md
      - lilu/configuration.md
      - lilu/usage.md
  - Baphomet:
