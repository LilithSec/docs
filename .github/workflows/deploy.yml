name: deploy-docs

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild nightly so edits in the component repos surface without a push here.
  # (For instant rebuilds, add a repository_dispatch from each component's CI.)
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: pip install -r requirements.txt

      # Pull each component repo's docs/ into docs/<section>/. All sources are
      # public, so no auth/token is needed.
      - name: Sync component docs
        run: ./scripts/sync-docs.sh

      - name: Build
        run: mkdocs build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
